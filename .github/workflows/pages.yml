# Deploys docs/ to GitHub Pages. REQUIRED: the repo's Pages source is set to
# "GitHub Actions" (Settings → Pages), so this workflow is the ONLY thing that
# publishes the site — GitHub's managed branch deploy no longer runs.
name: Deploy game to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Queue deploys instead of cancelling — a cancelled run can leave an orphaned
  # "github-pages" artifact that makes the NEXT run fail with "Multiple artifacts
  # named github-pages were unexpectedly found". Letting each finish avoids it.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 25
        with:
          # Ride out Pages queue congestion instead of cancelling the deploy.
          timeout: "1200000"
          error_count: "15"
