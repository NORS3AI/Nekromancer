# Deploys docs/ to GitHub Pages with current-generation actions (Node 24),
# replacing GitHub's managed "pages build and deployment" workflow — which
# pins deprecated Node 20 actions and has been prone to queue timeouts.
# configure-pages `enablement` flips the Pages source to "GitHub Actions"
# automatically on first run.
name: Deploy game to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload docs/ artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 25
        with:
          # The Pages deployment queue can back up for >10 minutes (the
          # action's default timeout); wait 20 so congestion doesn't turn
          # into a cancelled deployment.
          timeout: 1200000
          error_count: 15
