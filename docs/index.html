<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a070c">
<title>NEKROMANCER &mdash; Rise of the Dead</title>
<link rel="stylesheet" href="css/style.css?v=1.6.19">
</head>
<body>
<canvas id="game"></canvas>
<script>
  // Cache-bust every game script so a fresh deploy is NEVER served stale JS
  // (GitHub Pages caches assets ~10 min). Bump BUILD on every js/ change — it is
  // kept in step with GAME_VERSION in data.js. document.write keeps load order.
  var BUILD = '1.6.44';
  ['utils','settings','audio','particles','data','hero','input','world',
   'entities','items','skills','ui','screens','game']
    .forEach(function (f) { document.write('<script src="js/' + f + '.js?v=' + BUILD + '"><\/script>'); });
</script>
</body>
</html>
