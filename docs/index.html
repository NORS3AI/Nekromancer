<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a070c">
<title>NEKROMANCER &mdash; Rise of the Dead</title>
<script>
  // Cache-bust EVERYTHING (CSS + every game script) so a fresh deploy is NEVER
  // served stale (GitHub Pages caches assets ~10 min). Bump BUILD on every
  // js/css change — kept in step with GAME_VERSION in data.js. The stylesheet
  // is written from here too so its version can never lag the scripts again.
  var BUILD = '1.7.43';
  // Art version — bump ONLY when a file in art/ actually changes. Heavy
  // paintings stay cached across game releases (BUILD busts only js/css).
  // 11→12: the new painted tree sheets replaced the v1.7.34 pine1-3 content.
  // 12→13: the dead-tree sheet replaced the v1.7.34 deadtree1-3 content.
  // 13→14: ALL props re-cut with solid (opaque) alpha — they were rendering
  //        see-through because the old cut used luminance-driven alpha.
  // 14→15: select_title.webp re-cut KEEPING its interior black (the old cut
  //        hollowed out the frame's interior; owner rule).
  // 15→16: Dungeon.webp floor rebuilt = blend of the two owner stone textures.
  var ART_V = '16';
  document.write('<link rel="stylesheet" href="css/style.css?v=' + BUILD + '">');
</script>
</head>
<body>
<canvas id="game"></canvas>
<script>
  ['utils','settings','audio','particles','data','hero','input','world',
   'entities','items','skills','ui','screens','game']
    .forEach(function (f) { document.write('<script src="js/' + f + '.js?v=' + BUILD + '"><\/script>'); });
</script>
</body>
</html>
